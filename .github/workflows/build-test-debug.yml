name: Build & Test Debug

# KS14: Changed alot to stop relying on `dotnet test` command and instead directly use NUnit console
# KS14: Also made checkouts/submodule updates be shallow

on:
  push:
    branches: [ master, staging, stable ]
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ master, staging, stable ]

jobs:
  build:
    if: github.actor != 'PJBot' && github.event.pull_request.draft == false
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    # ---------------------------
    # NUnit download (NO version in paths)
    # ---------------------------
    - name: Download NUnit Console Runner
      run: |
        TAG=$(curl -s https://api.github.com/repos/nunit/nunit-console/releases/latest | grep tag_name | cut -d '"' -f 4)
        echo "Latest NUnit: $TAG"

        curl -L -o nunit.zip \
          "https://github.com/nunit/nunit-console/releases/download/${TAG}/NUnit.Console-${TAG}.zip"

        unzip -q nunit.zip -d nunit

    # Find runner dynamically (IMPORTANT FIX)
    - name: Locate NUnit runner
      run: |
        echo "Searching for nunit3-console..."
        find nunit -type f -name "nunit3-console*" -print

    - name: Checkout repo (shallow)
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1 # KS14: shallow
        persist-credentials: false # KS14: idk tbh allegedly this makes test run faster

    # KS14: shallow
    - name: Init submodules (shallow-safe)
      run: |
        git submodule update --init --recursive --depth 1

    - name: Pull engine updates
      uses: space-wizards/submodule-dependency@v0.1.5

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore

    - name: Build (fast CI config)
      run: >
        dotnet build
        --configuration DebugOpt
        --no-restore
        -m
        -p:DebugType=None
        -p:DebugSymbols=false
        -p:RunAnalyzers=false
        -p:EnableNETAnalyzers=false
        -p:BuildInParallel=true
        -p:CL_MPCount=2

    # ---------------------------
    # Tests (shared script)
    # ---------------------------
    - name: Run Content.Tests
      run: |
        export DOTNET_gcServer=1

        RUNNER=$(find nunit -type f -name nunit3-console | head -n 1)

        $RUNNER \
          bin/Content.Tests/Content.Tests.dll \
          --workers=1 \
          --labels=Off \
          --result=none

    - name: Run Content.IntegrationTests
      run: |
        export DOTNET_gcServer=1

        RUNNER=$(find nunit -type f -name nunit3-console | head -n 1)

        $RUNNER \
          bin/Content.IntegrationTests/Content.IntegrationTests.dll \
          --workers=1 \
          --labels=Off \
          --result=none

  ci-success:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: exit 0
