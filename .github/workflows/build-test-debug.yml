name: Build & Test Debug

on:
  push:
    branches: [ master, staging, stable ]
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ master, staging, stable ]

jobs:
  build:
    if: github.actor != 'PJBot' && github.event.pull_request.draft == false
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    # KS14: Use NUnit instead of `dotnet test`
    - name: Download NUnit Console Runner # KS14 addition
      run: |
        wget https://github.com/nunit/nunit-console/releases/download/3.22.0/NUnit.Console-3.22.0.zip
        unzip NUnit.Console-3.22.0.zip -d nunit

    - name: Checkout Master with Submodule
      uses: actions/checkout@v4.2.2
      with:
        submodules: recursive

    - name: Setup Submodule
      run: |
        git submodule update --init --recursive

    - name: Pull engine updates
      uses: space-wizards/submodule-dependency@v0.1.5

    - name: Update Engine Submodules
      run: |
        cd RobustToolbox/
        git submodule update --init --recursive

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4.1.0
      with:
        dotnet-version: 10.0.x

    - name: Install dependencies
      run: dotnet restore

    - name: Build Project
      run: dotnet build --configuration DebugOpt --no-restore /m

    # KS14: Use NUnit instead of `dotnet test`
    - name: Run Content.Tests (NUnit)
      run: |
        export DOTNET_gcServer=1
        ./nunit/NUnit.ConsoleRunner*/bin/net*/nunit3-console \
          bin/Content.Tests/Content.Tests.dll \
          --workers=1 \
          --labels=Off \
          --result=none

    # KS14: Use NUnit instead of `dotnet test`
    - name: Run Content.IntegrationTests (NUnit)
      run: |
        export DOTNET_gcServer=1
        ./nunit/NUnit.ConsoleRunner*/bin/net*/nunit3-console \
          bin/Content.IntegrationTests/Content.IntegrationTests.dll \
          --workers=1 \
          --labels=Off \
          --result=none

    # KS14: Remove test result archiving

  ci-success:
    name: Build & Test Debug
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: CI succeeded
        run: exit 0
