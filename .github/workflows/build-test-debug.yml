name: Build & Test Debug

# KS14: Changed alot to stop relying on `dotnet test` command and instead directly use NUnit console
# KS14: Also made checkouts/submodule updates be shallow

on:
  push:
    branches: [ master, staging, stable ]
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ master, staging, stable ]

jobs:
  build:
    if: github.actor != 'PJBot' && github.event.pull_request.draft == false
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    # ---------------------------
    # Checkout FIRST (needed for everything else)
    # ---------------------------
    - name: Checkout repo (shallow)
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1
        persist-credentials: false

    # ---------------------------
    # NUnit download (download first so breakages show up immediately)
    # ---------------------------
    - name: Resolve latest NUnit release
      id: nunit_release
      run: |
        TAG=$(curl -fsSL https://api.github.com/repos/nunit/nunit-console/releases/latest | grep -m1 '"tag_name"' | cut -d '"' -f 4)
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "Latest NUnit: $TAG"

    - name: Download NUnit Console Runner
      run: |
        mkdir -p nunit

        TAG='${{ steps.nunit_release.outputs.tag }}'

        curl -L -o nunit.zip \
          "https://github.com/nunit/nunit-console/releases/download/${TAG}/NUnit.Console-${TAG}.zip"

        unzip -q nunit.zip -d nunit
        rm -f nunit.zip

    # KS14: print what we downloaded for debugging
    - name: Inspect NUnit folder
      run: |
        echo "NUnit contents:"
        find nunit -type f | sort | sed -n '1,200p'

    # ---------------------------
    # Locate runner ONCE and reuse everywhere
    # ---------------------------
    - name: Locate NUnit runner
      run: |
        RUNNER=$(find nunit -type f -name "nunit3-console.dll" | head -n 1)

        if [ -z "$RUNNER" ]; then
          echo "ERROR: Could not locate nunit3-console.dll"
          exit 1
        fi

        echo "RUNNER=$RUNNER" >> "$GITHUB_ENV"
        echo "Using NUnit runner: $RUNNER"

    # ---------------------------
    # Submodules
    # ---------------------------
    - name: Init submodules (shallow-safe)
      run: |
        git submodule update --init --recursive --depth 1

    - name: Pull engine updates
      uses: space-wizards/submodule-dependency@v0.1.5

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore

    - name: Build (fast CI config)
      run: >
        dotnet build
        --configuration DebugOpt
        --no-restore
        -m
        -p:DebugType=None
        -p:DebugSymbols=false
        -p:RunAnalyzers=false
        -p:EnableNETAnalyzers=false
        -p:BuildInParallel=true
        -p:CL_MPCount=2

    # ---------------------------
    # Tests
    # ---------------------------
    - name: Run Content.Tests
      run: |
        export DOTNET_gcServer=1

        TEST_DLL=$(find bin -type f -name "Content.Tests.dll" | head -n 1)

        echo "Running: $TEST_DLL"
        dotnet "$RUNNER" \
          "$TEST_DLL" \
          --workers=1 \
          --labels=Off \
          --result=none

    - name: Run Content.IntegrationTests
      run: |
        export DOTNET_gcServer=1

        TEST_DLL=$(find bin -type f -name "Content.IntegrationTests.dll" | head -n 1)

        echo "Running: $TEST_DLL"
        dotnet "$RUNNER" \
          "$TEST_DLL" \
          --workers=1 \
          --labels=Off \
          --result=none

  ci-success:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: exit 0
