name: Server Announcement on PR status update

on:
  pull_request:
    types: [opened, reopened, closed]

jobs:
  notify-server:
    runs-on: ubuntu-latest
    steps:
    - name: Send PR notification
      run: |
        PR_NUMBER="${{ github.event.pull_request.number }}"
        PR_TITLE="${{ github.event.pull_request.title }}"
        PR_AUTHOR="${{ github.event.pull_request.user.login }}"

        # Build and send JSON
        JSON_PAYLOAD=$null
        PREFIX="(Space-Klovns/Klovnstation14) PR #${PR_NUMBER}"

        if [[ "${{ github.event.action }}" == "closed" ]]; then
          if [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
            JSON_PAYLOAD=$(jq -n \
              --arg token "${{ secrets.ANNOUNCEMENT_WEBHOOK_TOKEN }}" \
              --arg message "$PREFIX was merged: ${PR_TITLE} by ${PR_AUTHOR}" \
              '{Token: $token, Message: $message}')
          else
            JSON_PAYLOAD=$(jq -n \
              --arg token "${{ secrets.ANNOUNCEMENT_WEBHOOK_TOKEN }}" \
              --arg message "$PREFIX was closed without merging: ${PR_TITLE} by ${PR_AUTHOR}" \
              '{Token: $token, Message: $message}')
          fi
        else
          JSON_PAYLOAD=$(jq -n \
            --arg token "${{ secrets.ANNOUNCEMENT_WEBHOOK_TOKEN }}" \
            --arg message "$PREFIX was opened: ${PR_TITLE} by ${PR_AUTHOR}" \
            '{Token: $token, Message: $message}')
        fi

        curl -s -o /dev/null -w "%{http_code}" \
          -X POST \
          -H "Content-Type: application/json" \
          -d "$JSON_PAYLOAD" \
          "${{ vars.ANNOUNCEMENT_WEBHOOK_INTERFACE }}"
