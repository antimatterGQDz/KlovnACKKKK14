      content: >2-
               IDENTIFICATION DIVISION.
               PROGRAM-ID. SIGNALPROC.

               ENVIRONMENT DIVISION.
               CONFIGURATION SECTION.
               SOURCE-COMPUTER. CBSN-Z.
               OBJECT-COMPUTER. CBSN-Z.

               DATA DIVISION.
               WORKING-STORAGE SECTION.

               77  WS-INDEX            PIC 9(03) VALUE 1.
               77  WS-SUM              PIC S9(05)V99 VALUE 0.
               77  WS-AVERAGE          PIC S9(05)V99 VALUE 0.
               77  WS-PEAK             PIC S9(05)V99 VALUE 0.
               77  WS-THRESHOLD        PIC S9(03) VALUE 50.
               77  WS-SIGNAL-COUNT     PIC 9(03) VALUE 10.

               01  SIGNAL-TABLE.
                   05 SIGNAL-VALUE OCCURS 10 TIMES
                      INDEXED BY SIG-IDX.
                      10 SIG-DATA       PIC S9(03)V99.

               01  FILTERED-TABLE.
                   05 FILTERED-VALUE OCCURS 10 TIMES
                      INDEXED BY FILT-IDX.
                      10 FILT-DATA      PIC S9(03)V99.

               PROCEDURE DIVISION.

               MAIN-PROCESS.
                   DISPLAY "==================================".
                   DISPLAY " COBOL SIGNAL PROCESSING DEMO ".
                   DISPLAY "==================================".

                   PERFORM INITIALIZE-SIGNALS.
                   PERFORM DISPLAY-RAW-SIGNALS.
                   PERFORM CALCULATE-AVERAGE.
                   PERFORM FIND-PEAK.
                   PERFORM APPLY-FILTER.
                   PERFORM DETECT-THRESHOLD.
                   PERFORM DISPLAY-FILTERED.

                   DISPLAY "PROCESSING COMPLETE".
                   STOP RUN.

               INITIALIZE-SIGNALS.
                   MOVE 12.5 TO SIG-DATA(1).
                   MOVE 45.2 TO SIG-DATA(2).
                   MOVE 67.8 TO SIG-DATA(3).
                   MOVE 23.1 TO SIG-DATA(4).
                   MOVE 89.4 TO SIG-DATA(5).
                   MOVE 34.7 TO SIG-DATA(6).
                   MOVE 56.9 TO SIG-DATA(7).
                   MOVE 78.3 TO SIG-DATA(8).
                   MOVE 15.6 TO SIG-DATA(9).
                   MOVE 92.0 TO SIG-DATA(10).

               DISPLAY-RAW-SIGNALS.
                   DISPLAY "RAW SIGNAL VALUES:".
                   PERFORM VARYING WS-INDEX FROM 1 BY 1
                       UNTIL WS-INDEX > WS-SIGNAL-COUNT

                       DISPLAY "SIGNAL("
                           WS-INDEX
                           ") = "
                           SIG-DATA(WS-INDEX)

                   END-PERFORM.

               CALCULATE-AVERAGE.
                   MOVE 0 TO WS-SUM.

                   PERFORM VARYING WS-INDEX FROM 1 BY 1
                       UNTIL WS-INDEX > WS-SIGNAL-COUNT

                       ADD SIG-DATA(WS-INDEX)
                           TO WS-SUM

                   END-PERFORM.

                   COMPUTE WS-AVERAGE =
                       WS-SUM / WS-SIGNAL-COUNT.

                   DISPLAY "AVERAGE SIGNAL = "
                       WS-AVERAGE.

               FIND-PEAK.
                   MOVE SIG-DATA(1) TO WS-PEAK.

                   PERFORM VARYING WS-INDEX FROM 2 BY 1
                       UNTIL WS-INDEX > WS-SIGNAL-COUNT

                       IF SIG-DATA(WS-INDEX) > WS-PEAK
                           MOVE SIG-DATA(WS-INDEX)
                               TO WS-PEAK
                       END-IF

                   END-PERFORM.

                   DISPLAY "PEAK SIGNAL = "
                       WS-PEAK.

               APPLY-FILTER.
                   DISPLAY "APPLYING SIMPLE LOW-PASS FILTER".

                   MOVE SIG-DATA(1) TO FILT-DATA(1).

                   PERFORM VARYING WS-INDEX FROM 2 BY 1
                       UNTIL WS-INDEX > WS-SIGNAL-COUNT

                       COMPUTE FILT-DATA(WS-INDEX) =
                           (SIG-DATA(WS-INDEX)
                           + SIG-DATA(WS-INDEX - 1)) / 2

                   END-PERFORM.

               DETECT-THRESHOLD.
                   DISPLAY "THRESHOLD DETECTION RESULTS:".

                   PERFORM VARYING WS-INDEX FROM 1 BY 1
                       UNTIL WS-INDEX > WS-SIGNAL-COUNT

                       IF SIG-DATA(WS-INDEX) > WS-THRESHOLD
                           DISPLAY "ALERT: SIGNAL "
                               WS-INDEX
                               " ABOVE THRESHOLD -> "
                               SIG-DATA(WS-INDEX)
                       END-IF

                   END-PERFORM.

               DISPLAY-FILTERED.
                   DISPLAY "FILTERED SIGNAL VALUES:".

                   PERFORM VARYING WS-INDEX FROM 1 BY 1
                       UNTIL WS-INDEX > WS-SIGNAL-COUNT

                       DISPLAY "FILTER("
                           WS-INDEX
                           ") = "
                           FILT-DATA(WS-INDEX)

                   END-PERFORM.
