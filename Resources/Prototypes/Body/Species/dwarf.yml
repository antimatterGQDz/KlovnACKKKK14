- type: entity
  parent: AppearanceHuman
  id: AppearanceDwarf
  name: dwarf appearance
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: InitialBody # KS14: Re-arranged
    organs:
    - category: Head # head
      entity: OrganHumanHead
      children:
      - category: Brain
        entity: OrganHumanBrain
      - category: Eyes
        entity: OrganHumanEyes
      - category: Ears
        entity: OrganHumanEars
      - category: Tongue
        entity: OrganHumanTongue

    - category: Torso # torso
      entity: OrganHumanTorso
      children:
      - category: Appendix
        entity: OrganHumanAppendix
      - category: Lungs
        entity: OrganHumanLungs
      - category: Heart
        entity: OrganDwarfHeart
      - category: Stomach
        entity: OrganDwarfStomach
      - category: Liver
        entity: OrganHumanLiver
      - category: Kidneys
        entity: OrganHumanKidneys

    - category: ArmLeft # arm
      entity: OrganHumanArmLeft
      children:
      - category: HandLeft
        entity: OrganHumanHandLeft

    - category: ArmRight # arm
      entity: OrganHumanArmRight
      children:
      - category: HandRight
        entity: OrganHumanHandRight

    - category: LegLeft # leg
      entity: OrganHumanLegLeft
      children:
      - category: FootLeft
        entity: OrganHumanFootLeft

    - category: LegRight # leg
      entity: OrganHumanLegRight
      children:
      - category: FootRight
        entity: OrganHumanFootRight
  - type: HumanoidProfile
    species: Dwarf
  - type: ScaleVisuals
    scale: 1, 0.8

- type: entity
  parent:
  - AppearanceDwarf
  - MobHuman
  id: MobDwarf
  name: Urist McHands the Dwarf
  components:
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        # they r smaller
        density: 120
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Vocal
    sounds:
      Male: UnisexDwarf
      Female: FemaleDwarf
      Unsexed: UnisexDwarf
  - type: ReplacementAccent
    accent: scottish
  - type: Speech
    speechSounds: Bass

- type: entity
  parent: OrganBase
  id: OrganDwarf
  abstract: true
  suffix: Dwarf

- type: entity
  id: OrganDwarfMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Dwarf ]

- type: entity
  parent: [ OrganDwarfMetabolizer, OrganHumanStomach ]
  id: OrganDwarfStomach
  components:
  - type: Metabolizer
    maxReagents: 5

- type: entity
  parent: [ OrganDwarfMetabolizer, OrganHumanLiver ]
  id: OrganDwarfLiver

- type: entity
  parent: [ OrganDwarfMetabolizer, OrganHumanHeart ]
  id: OrganDwarfHeart
