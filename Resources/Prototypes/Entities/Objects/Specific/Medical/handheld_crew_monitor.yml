- type: entity
  name: handheld crew monitor
  categories: [ DoNotMap ]
  parent: BaseHandheldComputer #, BaseGrandTheftContraband ] KS14
  # CMO-only bud, don't add more.
  id: HandheldCrewMonitor
  description: A hand-held crew monitor displaying the status of suit sensors.
  components:
  - type: Item
    heldPrefix: scanner
  - type: Sprite
    sprite: Objects/Specific/Medical/handheldcrewmonitor.rsi
    state: scanner
  - type: ActivatableUI
    key: enum.CrewMonitoringUIKey.Key
  - type: UserInterface
    interfaces:
      enum.CrewMonitoringUIKey.Key:
        type: CrewMonitoringBoundUserInterface
  - type: CrewMonitoringConsole
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: CrewMonitor
  - type: WirelessNetworkConnection
    range: 500
  - type: StationLimitedNetwork
  - type: StaticPrice
    price: 500
#  - type: Tag KS14 start
#    tags:
#    - HighRiskItem
#  - type: StealTarget
#    stealGroup: HandheldCrewMonitor KS14 end
  - type: EmitSoundOnPickup # KS14: pickup/drop sounds
    sound:
      path: /Audio/_KS14/Handling/component_pickup.ogg
  - type: EmitSoundOnDrop # KS14: pickup/drop sounds
    sound:
      path: /Audio/_KS14/Handling/component_drop.ogg

- type: entity
  id: HandheldCrewMonitorEmpty
  parent: HandheldCrewMonitor
  suffix: Empty
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
