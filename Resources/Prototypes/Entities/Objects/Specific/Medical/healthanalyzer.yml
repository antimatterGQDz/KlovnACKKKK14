- type: entity
  parent: BaseItem
  id: HandheldHealthAnalyzer
  name: health analyzer
  description: A hand-held body scanner capable of distinguishing vital signs of the subject.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/healthanalyzer.rsi
    layers:
    - state: icon
    - state: analyzer
      shader: unshaded
      map: [ "unlit" ] # KS14
  - type: Item
    heldPrefix: analyzer
    storedRotation: -90
  - type: ActivatableUI
    key: enum.HealthAnalyzerUiKey.Key
  - type: UserInterface
    interfaces:
      enum.HealthAnalyzerUiKey.Key:
        type: HealthAnalyzerBoundUserInterface
  - type: ItemToggle
    onUse: false
  - type: HealthAnalyzer
    scanningEndSound:
      path: "/Audio/Items/Medical/healthscanner.ogg"
  - type: Tag
    tags:
    - DiscreteHealthAnalyzer
  - type: GuideHelp
    guides:
    - MedicalDoctor
  - type: EmitSoundOnPickup # KS14: pickup/drop sounds
    sound:
      path: /Audio/_KS14/Handling/component_pickup.ogg
  - type: EmitSoundOnDrop # KS14: pickup/drop sounds
    sound:
      path: /Audio/_KS14/Handling/component_drop.ogg
  # KS14: emissive start
  - type: EmissiveLayers
    glowRadius: 0
    intensity: 0.01
    layers:
    - unlit
  # KS14: emissive end
