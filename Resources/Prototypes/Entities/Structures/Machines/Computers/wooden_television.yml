- type: entity
  parent: ComputerSurveillanceWirelessCameraMonitor
  id: ComputerTelevision
  name: wooden television
  description: Finally, some decent reception around here...
  components:
  - type: Sprite
    noRot: true
    drawdepth: SmallObjects
    layers:
    - map: ["computerLayerBody"]
      state: television
    - map: ["computerLayerScreen"]
      state: detective_television
      shader: unshaded # KS14
  # KS14: emissive start
  - type: EmissiveLayers # TODO EMISSIVES: adjustable params for individual layers; rn, keyboards emit a bit too much light than i'd like them to
    glowRadius: 0
    intensity: 0.5
    layers:
    - computerLayerScreen
  # KS14: emissive end
  - type: Computer
    board: ComputerTelevisionCircuitboard
  - type: PointLight
    radius: 1.5
    energy: 3.0
    color: "#b89f25"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 200
        mask:
          - TabletopMachineMask
        layer:
          - TabletopMachineLayer
