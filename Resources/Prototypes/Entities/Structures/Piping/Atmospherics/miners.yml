- type: entity
  abstract: true
  name: gas miner
  description: Gases mined from the gas giant below (above?) flow out through this massive vent.
  parent: BaseStructure
  id: GasMinerBase
  placement:
    mode: SnapgridCenter
  components:
    - type: Clickable
    - type: InteractionOutline
    - type: Physics
      canCollide: true # KS14: false -> true
    - type: Fixtures
      fixtures:
        fix1:
          shape: # KS14: Changed shape to aabb
            !type:PhysShapeAabb
            bounds: "-0.5,-0.5,0.5,0.5"
          density: 190
          mask: # KS14: changed collision
          - FullTileMask
          layer: # KS14: changed collision
          - MachineLayer
    - type: Transform
      anchored: true
    - type: Anchorable
      flags:
      - Anchorable
    - type: Pullable
    - type: Sprite
      noRot: true # KS14
      sprite: _KS14/Structures/Piping/Atmospherics/miners.rsi # KS14: KS14 textures
      layers: # KS14: use one layer with map, instead of just setting state on spritecomponent
      - state: miner
        map: ["base"]
    - type: AtmosDevice
    - type: GasMiner
      maxExternalPressure: 300
      spawnAmount: 400
    - type: GuideHelp
      guides:
      - GasMiningAndStorage
    # KS14: Gasminer visuals start
    - type: AmbientSound # KS14: Ambient sound
      enabled: false
      volume: -12
      range: 4.5
      sound:
        path: /Audio/_KS14/Ambience/Objects/wind_plant_hum.ogg
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.GasMinerVisuals.State:
          base:
            Disabled: { state: "miner" }
            Idle: { state: "miner" }
            Working: { state: "on" }
    # KS14 End

- type: entity
  name: O2 gas miner
  parent: GasMinerBase
  id: GasMinerOxygen
  suffix: Shuttle, 300kPa
  placement:
    mode: SnapgridCenter
  components:
    - type: GasMiner
      spawnGas: Oxygen

- type: entity
  name: O2 gas miner
  parent: GasMinerOxygen
  id: GasMinerOxygenStation
  suffix: Station, 1000kPa
  components:
    - type: GasMiner
