- type: entity
  id: AirSensorBase
  abstract: true
  components:
  - type: DeviceNetwork
    deviceNetId: AtmosDevices
    receiveFrequencyId: AtmosMonitor
    transmitFrequencyId: AtmosMonitor
    prefix: device-address-prefix-sensor
    sendBroadcastAttemptEvent: true
    examinableAddress: true
  - type: WiredNetworkConnection
  - type: DeviceNetworkRequiresPower
  - type: AtmosDevice
  - type: AtmosMonitor
    temperatureThresholdId: stationTemperature
    pressureThresholdId: stationPressure
    gasThresholdPrototypes:
      Oxygen: stationOxygen
      Nitrogen: stationNitrogen
      CarbonDioxide: stationCO2
      Plasma: stationPlasma
      Tritium: stationTritium
      WaterVapor: stationWaterVapor
      Ammonia: stationAmmonia
      NitrousOxide: stationNO
      Frezon: danger
      Zipion: stationZipion
      Argon: GasArgon
  - type: Tag
    tags:
      - AirSensor
      - ForceFixRotations
  - type: GuideHelp
    guides:
    - DeviceMonitoringAndControl
    - AtmosphericsSystems
  # KS14: emissive start
  - type: EmissiveLayers
    glowRadius: 0.3
    intensity: 1
    useSpriteTransform: false
    layers:
    - enum.PowerDeviceVisualLayers.Powered
  # KS14: emissive end

- type: entity
  id: AirSensor
  name: air sensor
  description: Air sensor. It senses air.
  parent: [ AirSensorBase, AirSensorBaseVisuals ] # KS14: Added AirSensorBaseVisuals
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Physics
    canCollide: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Clickable
  - type: InteractionOutline
  - type: ApcPowerReceiver
  - type: ExtensionCableReceiver
  - type: AccessReader
    access: [ [ "Atmospherics" ] ]
  - type: Construction
    graph: AirSensor
    node: sensor
  # KS14: Moved Sprite, Appearance and GenericVisualizer to AirSensorBaseVisuals
  - type: Tag
    tags:
    - AirSensor
    - ForceFixRotations
  # Starlight Start: RPD
  - type: RCDDeconstructable
    cost: 2
    delay: 2
    fx: EffectRCDDeconstruct2
    rpd: true
  # Starlight End: RPD

- type: entity
  parent: [ BaseItem, BaseRelaxedAnchoring ]
  id: AirSensorAssembly
  name: air sensor assembly
  description: Air sensor assembly. An assembly of air sensors?
  components:
  - type: Item
    size: Small
  - type: Anchorable
  - type: Construction
    graph: AirSensor
    node: assembly
  - type: Sprite
    drawdepth: FloorObjects
    sprite: Structures/Specific/Atmospherics/sensor.rsi
    layers:
    - state: gsensor0
