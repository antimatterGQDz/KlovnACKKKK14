# Job-specific trinkets

## KS14 README: As part of plushie removal, I didn't remove anything here. Instead, I just made everything inaccessible in char setup and everywhere else.
## Otherwise there would be huge merge conflict bait.

- type: loadout
  id: JanitorGoldenPlunger
  effects:
  - !type:GroupLoadoutEffect
    proto: SeniorJanitorial
  storage:
    back:
    - GoldenPlunger

- type: loadout
  id: FlowerWaterClown
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobClown
      time: 4h
  storage:
    back:
    - SprayFlowerPin

- type: loadout
  id: SecStar
  effects:
    - !type:JobRequirementLoadoutEffect
      requirement:
        !type:DepartmentTimeRequirement
        department: Security
        time: 100h
  storage:
    back:
    - Dinkystar
