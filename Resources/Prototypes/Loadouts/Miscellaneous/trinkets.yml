# Timers
- type: loadoutEffectGroup
  id: Command
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:DepartmentTimeRequirement
      department: Command
      time: 1h

# Flowers
- type: loadout
  id: FlowerWreath
  storage:
    back:
    - ClothingHeadHatFlowerWreath

- type: loadout
  id: Hairflower
