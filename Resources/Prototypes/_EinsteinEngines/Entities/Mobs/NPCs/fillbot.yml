- type: entity
  parent: MobSiliconBase
  id: MobFillBot
  name: fillbot
  description: It picks up things and puts them somewhere else.
  components:
  - type: Fillbot
  - type: Sprite
    sprite: _EinsteinEngines/Mobs/Silicon/Bots/fillbot.rsi
    state: fillbot
  - type: Construction
    graph: FillBot
    node: bot
  - type: HTN
    rootTask:
      task: FillbotCompound
    blackboard:
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
  - type: Prying #KS14
    pryPowered: true
    force: true
    speedModifier: 1.5
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: ControllableBot #KS14
  - type: SentienceTarget
    flavorKind: station-event-random-sentience-flavor-mechanical
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 3
  - type: NoSlip
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: Hands
    hands:
      hand_right:
        location: Right
    sortedHands:
    - hand_right
  - type: ComplexInteraction
  - type: DeviceLinkSource
    ports:
      - FillItems
  - type: InteractionPopup
    interactSuccessString: petting-success-fillbot
    interactFailureString: petting-failure-fillbot
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
