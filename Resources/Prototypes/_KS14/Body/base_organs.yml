- type: entity
  id: KsBaseBodyEntityShowsContents
  abstract: true
  components:
  - type: ContainerContainer
    containers:
      body_organs: !type:Container
        showEnts: True

- type: entity
  id: KsBaseBodyEntityHidesContents
  abstract: true
  components:
  - type: ContainerContainer
    containers:
      body_organs: !type:Container
        showEnts: False

- type: entity
  id: KsBaseOrganSquishy
  abstract: true
  components:
  - type: EmitSoundOnPickup # KS14: pickup/drop sounds
    sound:
      collection: KsHandlingOrgan
      params:
        volume: -5
  - type: EmitSoundOnDrop # KS14: pickup/drop sounds
    sound:
      collection: KsHandlingOrgan
      params:
        volume: -5

- type: entity
  parent: KsBaseBodyEntityShowsContents
  id: KsBaseSublimb
  abstract: true
  components:
  - type: OrganAttachmentOperation
  - type: OrganAttachmentConstruction
    netNode: start # same as construction start node
    nodes:
      OpenIncision: null
  - type: Construction
    graph: SublimbGraph
    node: start
    deconstructionTarget: null
