- type: entity
  id: ComplexBodyBase
  abstract: true
  save: false
  components:
  - type: Construction
    graph: SurgeryGraph
    node: start
    deconstructionTarget: null
  - type: ConstructionEdgeDialogue
    loc: ks-mcqdialogue-surgery
    nodeNames:
    - OpenIncision
    - Saw open ribcage
    blacklistedTargets:
    - start
  - type: WormWithoutOrgans
    categories:
    - FootLeft
    - FootRight
  - type: InventoryRequiresOrgan
    categories:
      gloves:
      - HandLeft
      - HandRight
      shoes:
      - FootLeft
      - FootRight
      ears:
      - Ears
      eyes:
      - Head
      mask:
      - Head
      head:
      - Head
  - type: RequiresOrganToSee
    category: Eyes
  - type: DismembermentByDamage
    accumulatedDamageThreshold: 180
    deltaDamageThreshold: 10.5
    damageProtoId: Piercing
    organCategories:
    - ArmLeft
    - ArmRight
    - LegLeft
    - LegRight
    - HandLeft
    - HandRight
    - FootLeft
    - FootRight
  - type: OrganAttachmentOperation
    baseOrganCategories:
    - ArmLeft
    - ArmRight
    - LegLeft
    - LegRight
    - Head

    - FootLeft
    - FootRight
    - HandLeft
    - HandRight
    organRoutes:
      FootLeft: LegLeft
      FootRight: LegRight
      HandLeft: ArmLeft
      HandRight: ArmRight

      Brain: Head
      Eyes: Head
      Ears: Head

      Heart: Torso
  - type: OrganAttachmentConstruction
    netNode: start # same as construction start node
    baseOrgansAlwaysAttachable: true
