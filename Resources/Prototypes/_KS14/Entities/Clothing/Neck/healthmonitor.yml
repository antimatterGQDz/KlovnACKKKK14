- type: entity
  parent: ClothingNeckBase
  id: HealthMonitor
  name: health monitor
  description: A small, wearable device that outputs a signal when its wearer goes crit or dies.
  components:
  - type: Sprite
    sprite: _KS14/Clothing/Neck/Misc/healthmonitor.rsi
  - type: Clothing
    sprite: _KS14/Clothing/Neck/Misc/healthmonitor.rsi
  - type: StaticPrice
    price: 40
  - type: DeviceLinkSource
    ports:
    - Crit
    - Dead
  - type: SignalRattleOnTrigger
    targetUser: true
  - type: ClothingGrantComponent
    component:
    - type: ClothingRelayEventRequired
  - type: WornRelayEvent
  - type: TriggerOnMobstateChange
    mobState:
    - Critical
    - Dead
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: WirelessNetworkConnection
    range: 15
