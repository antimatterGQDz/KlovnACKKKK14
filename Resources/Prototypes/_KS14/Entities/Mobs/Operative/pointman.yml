- type: entity
  parent: MarkerBase
  id: KsMarkerNpcCamping
  name: camping marker
  suffix: KS14, NPC Camping Spot Marker
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    layers:
    - state: blue
  - type: NpcCampingSpot

## Base
- type: randomHumanoidSettings
  id: KsBaseOperative
  speciesBlacklist:
  - Vox
  - Dwarf
  components:
  - type: NoSlip
  - type: MovementSpeedModifier
    baseSprintSpeed: 3.375
    baseWalkSpeed: 1.875
  - type: RandomHumanoidAppearance
    randomizeName: false
  - type: NpcFactionMember
    factions:
    - Syndicate
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      101: Dead
  - type: NpcSensors
  - type: HTN
    rootTask:
      task: KsOperativeCombatCompound
    blackboard:
      ReloadActDelay: !type:Single
        0
      VisionRadius: !type:Single
        17.5
      AggroVisionRadius: !type:Single
        25
      CampingRange: !type:Single
        0.5
      CampingTime: !type:Single
        25
      AdvanceTime: !type:Single
        30
      NavInteract: !type:Bool
        true
  - type: TtsVoice
    id: en_US-arctic-medium

- type: randomHumanoidSettings
  parent: [ KsBaseOperative ]
  id: KsBaseEliteOperative
  speciesBlacklist:
  - Vox
  - Dwarf
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      140: Critical
      150: Dead
  - type: HTN
    rootTask:
      task: KsOperativeCombatCompound
    blackboard:
      ReloadActDelay: !type:Single
        0
      VisionRadius: !type:Single
        20
      AggroVisionRadius: !type:Single
        25
      CampingRange: !type:Single
        0.45
      CampingTime: !type:Single
        10
      AdvanceTime: !type:Single # Elite ops are generally more aggressive
        15
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        false
  - type: TtsVoice
    id: en_US-combatant-elite-medium

- type: startingGear
  parent: SyndicateFootsoldierGearRuin
  id: KsBaseOperativeGear
  equipment:
    mask: ClothingMaskGasSecurity
    eyes: ClothingEyesGlassesSunglasses
    belt: ClothingBeltMilitaryWebbing
    id: SyndicateIDCard
  storage:
    back:
    - Machete
    belt:
    - EmergencyMedipen

- type: startingGear
  parent: KsBaseOperativeGear
  id: KsBaseEliteOperativeGear
  equipment:
    neck: ClothingNeckMantleHOS
    shoes: ClothingShoesBootsJack
    outerClothing: ClothingOuterArmorBulletproof
    belt: ClothingBeltMilitaryWebbing
  storage:
    back:
    - EnergySword
    belt:
    - CombatMedipen
    - CombatMedipen

