- type: entity
  parent: WeaponRifleLecterXL8
  id: KsWeaponRifleLecterXL8EliteOperative
  name: modified XL8
  description: A variant of the Experimental Lecter 8 with several non-standard modifications present, heavily improving accuracy at the cost of making it bulkier.
  suffix: KS14, NPC
  components:
  - type: Item
    size: Ginormous
  - type: Gun
    minAngle: 15
    maxAngle: 25
    angleIncrease: 10
    angleDecay: 15
    fireRate: 7.8
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/batrifle.ogg
  - type: GunWieldBonus
    minAngle: -20
    maxAngle: -20
    angleIncrease: -4
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRifleIncendiary
        insertSound:
          path: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
          params:
            pitch: 0.75
        ejectSound:
          path: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
          params:
            pitch: 0.75
        priority: 2
        whitelist:
          tags:
          - MagazineRifle
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        priority: 1
        whitelist:
          tags:
          - CartridgeRifle

  - type: Sprite
    scale: 1.15,1.15
    color: '#adc9ff'
  - type: Clothing
    scale: 1.15,1.15

