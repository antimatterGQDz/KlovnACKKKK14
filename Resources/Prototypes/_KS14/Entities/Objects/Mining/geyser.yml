- type: entity
  id: KsGeyserBase
  name: undiscovered geyser
  description: It's a geyser. When scanned, it will conveniently show up on mass scanners.
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  # Physics
  - type: Transform
    anchored: true
    noRot: false
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: -0.35,-0.35,0.35,0.35
        density: 1500
        layer:
        - HalfWallLayer

  # Sprites
  - type: Sprite
    sprite: _KS14/Objects/Mining/geyser.rsi
    noRot: true
    offset: 0,0.5
    layers:
    - state: geyser
    - state: soup1
      map: ["enum.SolutionContainerLayers.Fill", "enum.MiningScannerVisualLayers.Overlay"]
      shader: unshaded
    - state: soup1
      color: '#000000ab'
  - type: InteractionOutline
  - type: Clickable
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    fillBaseName: soup
    solutionName: buffer

  # Trigger
  - type: KsScanTriggerOnDiscovered
    keyOut: discovered
  - type: AddComponentsOnTrigger
    keysIn: [discovered]
    components: # copied from PenEmbeddable
    - type: KsRadarInterest
      data:
        text: ""
  - type: SpawnOnTrigger # Placeholder for mining points lol
    keysIn: [discovered]
    proto: SpaceCash1000
    useMapCoords: true
    predicted: true

  # Plumbing
  - type: PlumbingDevice
    updateInterval: 2
  - type: PlumbingOutlet
    solutionName: buffer
  - type: NodeContainer
    nodes:
      outlet:
        !type:PlumbingNode
        nodeGroupID: Plumbing
        pipeDirection: Fourway

  # Solution
  - type: SolutionRegeneration
    solution: buffer
    generated:
      reagents:
      - ReagentId: Water
        Quantity: 100
  - type: SolutionContainerManager
    solutions:
      buffer:
        maxVol: 100
        canReact: false
  - type: DrainableSolution
    solution: buffer

  # Geyser
  - type: KsScanDiscoverable
    discoveryPopupLoc: ks-specific-geyser-discovered
    trueName: discovered geyser
  - type: MiningScannerViewable

- type: entity
  parent: KsGeyserBase
  id: KsGeyserBaseRare
  abstract: true
  components:
  - type: KsScanDiscoverable
    discoveryPopupLoc: ks-specific-geyser-discovered-rare
  - type: SpawnOnTrigger
    proto: SpaceCash2500

- type: entity
  parent: KsGeyserBase
  id: KsGeyserPlasma
  suffix: Plasma
  components:
