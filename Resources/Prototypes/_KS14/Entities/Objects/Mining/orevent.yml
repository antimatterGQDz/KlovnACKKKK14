## Settings

- type: oreWellSetting
  id: Roundstart
  totalResourceRateRange: 0.25,0.25
  resourceCountRange: 2,2
  possibleResourceTypes:
  - SteelOre
  - SpaceQuartz

- type: oreWellSetting
  id: Basic
  totalResourceRateRange: 0.3,0.8
  resourceCountRange: 2,3
  possibleResourceTypes:
  - SteelOre
  - Coal
  - PlasmaOre
  - GoldOre

- type: oreWellSetting
  id: Rare
  totalResourceRateRange: 0.2,0.3
  resourceCountRange: 1,2
  possibleResourceTypes:
  - GoldOre
  - DiamondOre
  - UraniumOre
