- type: entity
  id: KsOreVentBase
  name: ore vent
  description: "An ore vent, brimming with underground ore. Once discovered, it can be scanned again for ore extraction to be started."
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  # Physics
  - type: Transform
    anchored: true
    noRot: true
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 1200
        layer:
        - HalfWallLayer

  # Vent
  - type: DoAfter # doafter is on the vent
  - type: OreVent
    preExtractionDuration: 3s
    clearingIterations: 6
    tappingProcessEntityProto: KsOreVentMobSpawnerLava
    droneEntityProto: KsOreVentDrone
    extractionDuration: 75s
    oreWellSettingId: Basic
  - type: Explosive
    explosionType: OreVentClearing
    maxIntensity: 100
    totalIntensity: 80
    intensitySlope: 5
    canCreateVacuum: false
    repeatable: true
    deleteAfterExplosion: false

  # Sprites
  - type: Sprite
    sprite: _KS14/Objects/Mining/ore_vent.rsi
    offset: 0,0.5
  - type: SpriteFade
  - type: InteractionOutline
  - type: Clickable
  - type: Appearance

  # Scanning
  - type: MiningScannerViewable

- type: entity
  parent: KsOreVentBase
  id: KsOreVentBaseDiscoverable
  abstract: true
  components:
  - type: KsScanTriggerOnDiscovered
    keyOut: discovered
  - type: KsScanDiscoverable
    discoveryPopupLoc: ks-specific-orevent-discovered
    trueName: discovered ore vent
  - type: AddComponentsOnTrigger
    keysIn: [discovered]
    components: # copied from PenEmbeddable
    - type: KsRadarInterest
      data:
        text: discovered ore vent

### Variants: undiscoverable

- type: entity
  parent: KsOreVentBase
  id: KsOreVentLavaBase
  suffix: Lava, Undiscoverable
  abstract: true
  components:
  - type: OreVent
    tappingProcessEntityProto: KsOreVentMobSpawnerLava

  - type: Sprite
    layers:
    - state: ore_vent
      map: ["enum.MiningScannerVisualLayers.Overlay", "vent"]
    - state: well
      visible: false
      map: ["well"]
  - type: GenericVisualizer
    visuals:
      enum.OreVentVisuals.Tapped:
        vent:
          True: { state: ore_vent_active }
          False: { state: ore_vent }
        well:
          True: { visible: true }
          False: { visible: false }

- type: entity
  parent: KsOreVentBase
  id: KsOreVentIceBase
  suffix: Ice, Undiscoverable
  abstract: true
  components:
  - type: OreVent
    tappingProcessEntityProto: KsOreVentMobSpawnerIce

  - type: Sprite
    layers:
    - state: ore_vent_ice
      map: ["enum.MiningScannerVisualLayers.Overlay", "vent"]
    - state: well
      visible: false
      map: ["well"]
  - type: GenericVisualizer
    visuals:
      enum.OreVentVisuals.Tapped:
        vent:
          True: { state: ore_vent_ice_active }
          False: { state: ore_vent_ice }
        well:
          True: { visible: true }
          False: { visible: false }

### Variants: undiscoverable, tapped

- type: entity
  parent: KsOreVentLavaBase
  id: KsOreVentLavaTappedRoundstart
  description: "An ore vent, brimming with underground ore. It's already tapped, for your convenience."
  suffix: Lava, Tapped, Roundstart, Undiscoverable
  components:
  - type: OreVent
    tapped: true
    oreWellSettingId: Roundstart

- type: entity
  parent: KsOreVentIceBase
  id: KsOreVentIceTappedRoundstart
  description: "An ore vent, brimming with underground ore. It's already tapped, for your convenience."
  suffix: Ice, Tapped, Roundstart, Undiscoverable
  components:
  - type: OreVent
    tapped: true
    oreWellSettingId: Roundstart

