
- type: entity
  id: SupplyPod
  name: supply pod
  description: Sent from orbit, down to you.
  abstract: true
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    sprite: _KS14/Objects/SupplyPod/supplypods_64x64.rsi
    drawdepth: Effects
    offset: 0,0.5
    layers:
    - state: pod
    - state: pod_door
    - state: default

  - type: SupplyPod
    transitDuration: 1s
    fallDuration: 1s
    fallSoundDelay: 0s
    fallSound: /Audio/_KS14/Weapons/mortar_long_whistle.ogg
    impactSound: /Audio/Effects/metal_slam2.ogg
    height: 14

- type: entity
  id: BaseSupplyPodExplosive
  abstract: true
  components:
  - type: TriggerOnSupplyPodLanded
  - type: ExplosionOnTrigger
    explosionType: KsSupplyPodMissile
    maxTileIntensity: 600
    totalIntensity: 600
    intensitySlope: 35
    maxTileBreak: 1
  - type: DeleteOnTrigger

## CRUISE MISSILES: INERT

# nt
- type: entity
  parent: SupplyPod
  id: SupplyPodMissileNtInert
  name: nanotrasen orbital cruise missile
  description: Launched from a silo in fuck-off nowhere. This came a long way to ruin the nights of Nanotrasen's enemies.
  suffix: Inert
  components:
  - type: Sprite
    layers:
    - state: missile
  - type: SupplyPod
    height: 40
    fallDuration: 1.5s
    fallSoundDelay: 0s
    fallSound:
      path: /Audio/_KS14/Weapons/mortar_long_whistle.ogg
      params:
        pitch: 0.75

# syndie
- type: entity
  parent: SupplyPodMissileNtInert
  id: SupplyPodMissileSyndicateInert
  name: syndicate orbital cruise missile
  description: Launched from a silo in fuck-off nowhere. This came a long way to ruin your day.
  suffix: Inert
  components:
  - type: Sprite
    layers:
    - state: smissile

## CRUISE MISSILES: ARMED

# nt
- type: entity
  parent: [ SupplyPodMissileNtInert, BaseSupplyPodExplosive ]
  id: SupplyPodMissileNtExplosive
  suffix: Armed

# syndie
- type: entity
  parent: [ SupplyPodMissileSyndicateInert, BaseSupplyPodExplosive ]
  id: SupplyPodMissileSyndicateExplosive
  suffix: Armed



- type: explosion
  id: KsSupplyPodMissile
  damagePerIntensity:
    types:
      Heat: 5
      Blunt: 7
      Piercing: 2
  tileBreakChance: [0, 0.25, 0.6, 1]
  tileBreakIntensity: [0, 7, 15, 22]
  tileBreakRerollReduction: 20
  lightColor: Orange
  texturePath: /Textures/Effects/fire.rsi
  fireStates: 3
  temperature: 3200
  smallSoundIterationThreshold: 0
  sound:
    path: /Audio/_KS14/Effects/tank_explosion_louder.ogg
    params:
      pitch: 1
      maxDistance: 20
      referenceDistance: 5
      volume: 1
  soundFar:
    path: /Audio/_KS14/Effects/tank_explosion_distant.ogg
    params:
      pitch: 0.7
      volume: -5
