- type: entity
  name: swiss army knife
  parent: BaseItem
  id: SwissArmyKnife
  description: A multi-tool constructed out of titanium alloy, replaces the need to carry around a toolbelt. Very slow, doesnt include a welder.
  suffix: DEBUG
  components:
  - type: Sprite
    sprite: Objects/Tools/debug.rsi
    state: icon
  - type: Clothing
    sprite: Objects/Tools/debug.rsi
    quickEquip: false
    slots:
      - Belt
  - type: MeleeWeapon
    damage:
      types:
        Slash: 15
  - type: ToolTileCompatible
  - type: Tool
    speedModifier: 0.4
  - type: Prying
    speedModifier: 0.7
  - type: MultipleTool
    statusShowBehavior: true
    entries:
      - behavior: Prying
        useSound: /Audio/Items/jaws_pry.ogg
        changeSound: /Audio/Items/change_jaws.ogg
      - behavior: Cutting
        useSound: /Audio/Items/jaws_cut.ogg
        changeSound: /Audio/Items/change_jaws.ogg
      - behavior: Screwing
        useSound: /Audio/Items/drill_use.ogg
        changeSound: /Audio/Items/change_drill.ogg
      - behavior: Anchoring
        useSound: /Audio/Items/drill_use.ogg
        changeSound: /Audio/Items/change_drill.ogg
