- type: entity
  id: BaseServerVisuals
  abstract: true
  components:
  - type: Sprite
    sprite: Structures/Machines/server.rsi # KS14: use ks14 variant
    snapCardinals: true
    layers:
      - state: server-nopower # KS14: server-off -> server-nopower
      - state: server-on
        shader: unshaded # KS14
        sprite: _KS14/Structures/Machines/server.rsi # KS14: use ks14 variant
        map: ["enum.PowerDeviceVisualLayers.Powered"]
      - state: variant-research
      - state: server_o
        map: ["enum.WiresVisualLayers.MaintenancePanel"]
  # KS14: emissive start
  - type: EmissiveLayers
    intensity: 3
  # KS14: emissive end
