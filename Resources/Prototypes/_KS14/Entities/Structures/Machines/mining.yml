- type: entity
  parent: OreBox
  id: KsProcessedOreBox
  name: processed material collector
  description: A large storage container for holding the byproducts of ore processing; sheets, ingots, and the like. It has built-in self-powering magnets to pick up ore. It won't budge.
  suffix: Enabled
  components:
  - type: MagnetPickup
    slotIrrespective: true
  - type: ItemToggle
    activated: true
    onActivate: false
  - type: Storage
    whitelist:
      tags:
      - Sheet
      - RawMaterial
      - Ingot
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: Sprite
    color: '#848484'

- type: entity
  parent: BaseFlatpack
  id: KsProcessedOreBoxFlatpack
  name: processed material collector flatpack
  description: A flatpack used for constructing a processed material collector.
  components:
  - type: Flatpack
    entity: KsProcessedOreBox
  - type: Sprite
    layers:
    - state: fax-machine
  - type: StaticPrice
    price: 550
