    sprite: _KS14/Structures/Specific/Atmospherics/sensor.rsi # KS14: ks14
    layers: # KS14: added base
    - state: base
    - state: gsensor1
      shader: unshaded # KS14: unshaded
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]
  - type: GenericVisualizer
