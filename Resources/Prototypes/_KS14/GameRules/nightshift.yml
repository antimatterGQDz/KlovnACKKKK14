- type: entity
  parent: BaseGameRule
  id: BaseNightshift
  abstract: true
  components:
  - type: StationEvent
    startAnnouncement: ks-station-event-nightshift-start-announcement
    startAnnouncementColor: Gray
    endAnnouncement: ks-station-event-nightshift-end-announcement
    endAnnouncementColor: Gray
    startAudio: &nsaudio
      path: /Audio/Misc/notice2.ogg
      params:
        volume: -3
    endAudio: *nsaudio
    duration: 1890
    maxDuration: 1890
  - type: NightshiftRule
    dangerousAlertLevels:
    - violet
    - yellow
    - red
    - gamma
    - delta
    - epsilon

- type: entity
  parent: BaseNightshift
  id: NightshiftSaltern
  components:
  - type: StationEvent
    duration: 1890
    maxDuration: 1890
  - type: NightshiftRule
    color: '#707391'

- type: entity
  parent: BaseNightshift
  id: NightshiftTotalAlert
  components:
  - type: StationEvent
    duration: 300
    maxDuration: 300
    startAnnouncement: ks-station-event-nightshift-totalalert-start-announcement
    startAnnouncementColor: Red
    endAnnouncement: ks-station-event-nightshift-totalalert-end-announcement
    endAnnouncementColor: DarkGreen
    startAudio:
      path: /Audio/_KS14/Effects/warning_buzzer.ogg
      params:
        volume: 2
        pitch: 0.45
  - type: NightshiftRule
    color: '#db5e56'
    dangerousAlertLevels:
    - green

- type: entity
  parent: NightshiftTotalAlert
  id: NightshiftTotalAlert2
  components:
  - type: StationEvent
    startAnnouncement: ks-station-event-nightshift-totalalert2-start-announcement
    startAudio:
      path: /Audio/_KS14/Effects/warning_buzzer.ogg
      params:
        volume: 2
        pitch: 0.9
