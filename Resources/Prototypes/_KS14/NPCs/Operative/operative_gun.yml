# Tries to shoot a target at range.
- type: htnCompound
  id: KsOperativeGunCombatCompound
  branches:
  # Move into range and shoot the target.
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: KsNearbyGunTargets

    # LastTargetCoords hasnt been copied yet so do this
    - !type:HTNCompoundTask
      task: KsOperativeAnnounceCombatCompound

    - !type:HTNPrimitiveTask # copy target coords
      operator: !type:CopyKeyOperator
        originKey: TargetCoordinates
        targetKey: LastTargetCoordinates

    - !type:HTNPrimitiveTask # Set combat time
      operator: !type:SetTimeOperator
        key: TimeOfLastCombat

    - !type:HTNPrimitiveTask
      operator: !type:MoveToOperator
        shutdownState: PlanFinished
        pathfindInPlanning: true
        removeKeyOnFinish: true
        targetKey: TargetCoordinates
        pathfindKey: TargetPathfind
        rangeKey: RangedRange
        stopOnLineOfSight: true
        requireLosForRangeCheck: true

    - !type:HTNPrimitiveTask
      preconditions:
      - !type:KeyExistsPrecondition
        key: Target
      operator: !type:GunOperator
        targetKey: Target
        opaqueKey: false
      services:
      - !type:UtilityService
        id: RangedService
        proto: KsNearbyGunTargets
        key: Target

    - !type:HTNPrimitiveTask # marker
      operator: !type:EnsureVirtualMarkerOperator
        id: OpInCombat

# Selects ammo in range, then moves to it and picks it up
- type: htnCompound
  id: KsOperativePickupAmmoCompound
  branches:
  # Find ammo then pick it up.
  - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:UtilityOperator
          proto: NearbyAmmo

      - !type:HTNPrimitiveTask
        operator: !type:MoveToOperator

      - !type:HTNPrimitiveTask
        preconditions:
          - !type:TargetInRangePrecondition
            targetKey: Target
            rangeKey: InteractRange
        operator: !type:InteractWithOperator
          targetKey: Target

- type: htnCompound
  id: KsOperativeRangedCombatCompound
  branches:
  # Close or rack the gun chamber if necessary
  - preconditions:
    - !type:ActiveHandComponentPrecondition
      components:
      - type: Gun
    - !type:GunAmmoPrecondition
      minPercent: 0.001
    - !type:NeedToRackBoltPrecondition
    tasks:
      - !type:HTNPrimitiveTask
        operator: !type:RackBoltOperator

  # Wield gun
  - preconditions:
    - !type:ActiveHandComponentPrecondition
      components:
      - type: Gun
    - !type:CanWieldPrecondition
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:WieldOperator

  # Move to target and shoot them if ammo
  - preconditions:
    - !type:GunAmmoPrecondition
      minPercent: 0.001
    tasks:
    - !type:HTNCompoundTask
      task: KsOperativeGunCombatCompound

  # Pickup gun with ammo if we have no gun
  - preconditions:
    - !type:ActiveHandComponentPrecondition
      components:
      - type: Gun
      invert: true
    tasks:
    - !type:HTNCompoundTask
      task: PickupGunCompound

  # Discard gun if no ammo
  - preconditions:
    - !type:ActiveHandComponentPrecondition
      components:
      - type: Gun
    - !type:GunAmmoPrecondition
      maxPercent: 0.001
    tasks:
    - !type:HTNCompoundTask
      task: KsOperativeReloadOrDiscardActiveGun

- type: htnCompound
  id: KsOperativeReloadOrDiscardActiveGun
  branches:
  - tasks:
    - !type:HTNCompoundTask
      task: KsOperativeReloadActiveGun
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:DropOperator

    - !type:HTNPrimitiveTask # VOICELINE
      operator: !type:SpeakOperator
        speech: !type:LocalizedSetSpeakOperatorSpeech
          lineSet: KsOperativeOutOfAmmo

- type: htnCompound
  id: KsOperativeReloadActiveGun
  branches:
  - tasks:
    - !type:HTNPrimitiveTask # VOICELINE
      operator: !type:SpeakOperator
        speech: !type:LocalizedSetSpeakOperatorSpeech
          lineSet: KsOperativeReloading

    # Look for ammo
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: KsInventoryAmmo
        key: ChosenAmmo

    - !type:HTNPrimitiveTask
      operator: !type:CopyKeyOperator
        originKey: ActiveHand
        targetKey: WeaponActiveHand

    - !type:HTNPrimitiveTask
      operator: !type:GetActiveHeldItemOperator
        key: ActiveWeapon

    - !type:HTNPrimitiveTask # Hands: swap to free
      operator: !type:SwapToFreeHandOperator
    - !type:HTNPrimitiveTask # Wait one tick for any virtual item from the wield to be deleted so that a hand is free, as they are QueueDel'd
      operator: !type:WaitTickOperator

    - !type:HTNPrimitiveTask # Static reload act delay
      operator: !type:StaticWaitOperator
        key: ReloadActDelay

    # Equip ammo in offhand
    - !type:HTNPrimitiveTask
      operator: !type:EquipOperator
        target: ChosenAmmo

    - !type:HTNPrimitiveTask
      operator: !type:InteractUsingOperator
        targetKey: ActiveWeapon

    - !type:HTNPrimitiveTask
      operator: !type:DropOperator
        succeedIfHandEmpty: true

    - !type:HTNPrimitiveTask # Hands: swap back
      operator: !type:SwapToHandOperator
        key: WeaponActiveHand
    - !type:HTNPrimitiveTask # Wielding: wield
      operator: !type:WieldOperator

- type: utilityQuery
  id: KsInventoryAmmo
  query:
  - !type:InventoryQuery
  - !type:ComponentFilter
    components:
    - type: BallisticAmmoProvider
    - type: Item
  considerations:
  - !type:TargetAmmoMatchesCon
    curve: !type:BoolCurve
  # TODO: Get ammo count.

- type: utilityQuery
  id: KsNearbyGunTargets
  query:
  - !type:NearbyHostilesQuery
  considerations:
  - !type:TargetIsAliveCon
    curve: !type:BoolCurve
  - !type:TargetIsCritCon
    curve: !type:InverseBoolCurve
  - !type:TargetDistanceCon
    curve: !type:PresetCurve
      preset: TargetDistance
  - !type:TargetHealthCon
    curve: !type:PresetCurve
      preset: TargetHealth
  - !type:TargetAccessibleCon
    curve: !type:BoolCurve
  - !type:TargetInLOSCon # InLOSOrCurrent -> InLOS
    curve: !type:BoolCurve

- type: htnCompound
  id: KsOperativeAnnounceCombatCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: LastTargetCoordinates
      inverted: true
    tasks:
    - !type:HTNPrimitiveTask # VOICELINE
      operator: !type:SpeakOperator
        cooldown: 5
        speech: !type:LocalizedSetSpeakOperatorSpeech
          lineSet: KsOperativeContact
