
# List of used sensors:
#   Disturbance
#     EntityCoordinates TargetCoordinates
#
#  ...


- type: htnCompound
  id: KsOperativeConsiderSensorsCompound
  branches:
  # Handle sense: Disturbance: In-combat
  - preconditions:
    - !type:HasVirtualMarkerPrecondition
      id: OpInCombat

    # If someone is being chased or whatnot, don't try to reposition
    - !type:KeyExistsPrecondition
      key: "LastTargetCoordinates"
      inverted: true

    # Only do this if its been ~15sec since last combat
    # Not actually used for melees lol
    - !type:KeyTimePassedPrecondition
      key: TimeOfLastCombat
      delay: 15s

    # Sensor key
    - !type:KeyExistsPrecondition
      key: "__Sensor__Disturbance.TargetCoordinates"
    tasks:
    - !type:HTNPrimitiveTask # VOICELINE
      operator: !type:SpeakOperator
        speech: !type:LocalizedSetSpeakOperatorSpeech
          lineSet: KsOperativeDisturbanceCombat

    - !type:HTNPrimitiveTask
      operator: !type:CopyKeyOperator
        originKey: "__Sensor__Disturbance.TargetCoordinates"
        targetKey: LastTargetCoordinates

    # Delete sensor data
    - !type:HTNPrimitiveTask
      operator: !type:SetNullOperator
        key: "__Sensor__Disturbance.TargetCoordinates"

    - !type:HTNPrimitiveTask # Set combat time
      operator: !type:SetTimeOperator
        key: TimeOfLastCombat

  # Handle sense: Disturbance: Out-of-combat
  - preconditions:
    # DGAF about disturbances if in combat
    - !type:HasVirtualMarkerPrecondition
      id: OpInCombat
      invert: true

    # Sensor key
    - !type:KeyExistsPrecondition
      key: "__Sensor__Disturbance.TargetCoordinates"
    tasks:
    - !type:HTNPrimitiveTask # VOICELINE
      operator: !type:SpeakOperator
        speech: !type:LocalizedSetSpeakOperatorSpeech
          lineSet: KsOperativeDisturbance

    - !type:HTNPrimitiveTask
      operator: !type:CopyKeyOperator
        originKey: "__Sensor__Disturbance.TargetCoordinates"
        targetKey: LastTargetCoordinates

    # Delete sensor data
    - !type:HTNPrimitiveTask
      operator: !type:SetNullOperator
        key: "__Sensor__Disturbance.TargetCoordinates"

    # Enter combat
    - !type:HTNPrimitiveTask # marker
      operator: !type:EnsureVirtualMarkerOperator
        id: OpInCombat

  # Handle sense: Retaliation warning
  - preconditions:
    # Sensor key
    - !type:KeyExistsPrecondition
      key: "__Sensor__WarningRetaliation"
    tasks:
    - !type:HTNPrimitiveTask # VOICELINE
      operator: !type:SpeakOperator
        speech: !type:LocalizedSetSpeakOperatorSpeech
          lineSet: KsOperativeGetAway

    # Delete sensor data
    - !type:HTNPrimitiveTask
      operator: !type:SetNullOperator
        key: "__Sensor__WarningRetaliation"

  # Get sensor data
  - tasks:
    - !type:HTNPrimitiveTask
        operator: !type:HandleSensorsOperator
