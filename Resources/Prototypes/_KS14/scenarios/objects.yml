- type: entity
  name: pinpointer
  id: PinpointerScenarioObjective
  parent: PinpointerBase
  suffix: Scenario, Objective
  components:
  - type: Pinpointer
    component: ScenarioObjective
    targetName: objective

- type: entity
  name: pinpointer
  id: PinpointerScenarioNanotrasen
  parent: PinpointerBase
  suffix: Scenario, Nanotrasen
  components:
  - type: Pinpointer
    component: ScenarioNt
    targetName: nanotrasen operative

- type: entity
  id: ToolboxSyndicateTurret
  name: deployable syndicate turret
  parent: ToolboxSyndicate
  components:
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 1
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:SpawnEntitiesBehavior
            spawn:
              WeaponTurretSyndicateDisposable:
                min: 1
                max: 1
  - type: StaticPrice
    price: 1350
