- type: entity
  id: VendingMachineSecCoin
  parent: [BaseStructure, StorePresetSecToken, BaseGrandTheftContraband]
  name: Bluespace Security Vendor
  description: State of the art bluespace teleportation vendor for obtaining security gear. It is made out unknown alloy and looks almost indestructible, runs off an EMP immune internal bluespace reactor.
  suffix: sec, vendor, coin
  components:
  - type: Anchorable
    delay: 30
  - type: RadiationBlocker
    resistance: 5
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000 # Unbothered aryan machine, NT only provides ONE of these due to its cost so if syndicates manage to break it, its gone!
  - type: InteractionOutline
  - type: Sprite
    sprite: Structures/Machines/VendingMachines/ammo.rsi
    layers:
    - state: off
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: Store
    balance:
      Securitytoken: 0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 300
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
