- type: entity
  parent: VendingMachine
  id: VendingMachineSecCoin
  name: Hot & Ready
  description: You feel an overwhelming urge to shitsec upon viewing this machine.
  components:
  - type: VendingMachine
    pack: Null
    cashSlot: Null
    offState: off
    brokenState: broken
    normalState: normal-unshaded
  - type: DatasetVocalizer
    dataset: CondimentVendAds
  - type: SpeakOnUIClosed
    pack: GenericVendGoodbyes
  - type: Sprite
    sprite: Structures/Machines/VendingMachines/ammo.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: Store
    balance:
      Telecrystal: 5 # Small initial balance
  - type: AccessReader
    access: [["NuclearOperative"], ["SyndicateAgent"]]
